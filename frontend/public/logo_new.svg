<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#FFFFFF" stroke="#1E3A8A" stroke-width="3"/>
  
  <!-- Blockchain Network (Teal) - Interconnected nodes -->
  <circle cx="100" cy="60" r="8" fill="#0EA5A4"/>
  <circle cx="70" cy="90" r="8" fill="#0EA5A4"/>
  <circle cx="130" cy="90" r="8" fill="#0EA5A4"/>
  <circle cx="85" cy="130" r="8" fill="#0EA5A4"/>
  <circle cx="115" cy="130" r="8" fill="#0EA5A4"/>
  
  <!-- Connection Lines (Deep Blue) -->
  <line x1="100" y1="60" x2="70" y2="90" stroke="#1E3A8A" stroke-width="2.5"/>
  <line x1="100" y1="60" x2="130" y2="90" stroke="#1E3A8A" stroke-width="2.5"/>
  <line x1="70" y1="90" x2="85" y2="130" stroke="#1E3A8A" stroke-width="2.5"/>
  <line x1="130" y1="90" x2="115" y2="130" stroke="#1E3A8A" stroke-width="2.5"/>
  <line x1="70" y1="90" x2="130" y2="90" stroke="#1E3A8A" stroke-width="2.5"/>
  <line x1="85" y1="130" x2="115" y2="130" stroke="#1E3A8A" stroke-width="2.5"/>
  
  <!-- Humanitarian Heart (Soft Green) - Success/Impact -->
  <path d="M 100 155 C 100 155 75 140 75 125 C 75 115 82 110 90 110 C 95 110 98 112 100 115 C 102 112 105 110 110 110 C 118 110 125 115 125 125 C 125 140 100 155 100 155 Z" fill="#22C55E"/>
  
  <!-- Aid Package Icon (Deep Blue) -->
  <rect x="90" y="70" width="20" height="15" fill="#1E3A8A" rx="2"/>
  <line x1="95" y1="70" x2="95" y2="85" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="105" y1="70" x2="105" y2="85" stroke="#FFFFFF" stroke-width="1.5"/>
  
  <!-- Checkmark (Soft Green) - Verification -->
  <path d="M 95 105 L 100 110 L 110 95" stroke="#22C55E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1F2937" text-anchor="middle">AidTrace</text>
</svg>