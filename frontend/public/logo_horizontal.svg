  </g>
  
  <!-- Text - White with subtle glow -->\n  <text x="65" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" stroke="#14F1EF" stroke-width="0.5">Aid</text>
  <text x="100" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" stroke="#0EA5A4" stroke-width="0.5">Trace</text>
  <text x="65" y="48" font-family="Arial, sans-serif" font-size="8" fill="#14F1EF" letter-spacing="1" font-weight="600">TRANSPARENT GIVING</text>
