<svg width="180" height="60" viewBox="0 0 180 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon Container -->\n  <g transform="translate(5, 5)">
    <!-- Background Circle - White with border -->\n    <circle cx="25" cy="25" r="24" fill="#FFFFFF" stroke="#14F1EF" stroke-width="2"/>
    
    <!-- Blockchain Network (Bright Cyan) -->\n    <circle cx="25" cy="15" r="3" fill="#14F1EF"/>
    <circle cx="15" cy="25" r="3" fill="#14F1EF"/>
    <circle cx="35" cy="25" r="3" fill="#14F1EF"/>
    <circle cx="20" cy="35" r="3" fill="#14F1EF"/>
    <circle cx="30" cy="35" r="3" fill="#14F1EF"/>
    
    <!-- Connection Lines (Teal) -->\n    <line x1="25" y1="15" x2="15" y2="25" stroke="#0EA5A4" stroke-width="1.5"/>
    <line x1="25" y1="15" x2="35" y2="25" stroke="#0EA5A4" stroke-width="1.5"/>
    <line x1="15" y1="25" x2="20" y2="35" stroke="#0EA5A4" stroke-width="1.5"/>
